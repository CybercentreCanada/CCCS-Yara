#  CCCS YARA Standard Configuration
#
# --FORMAT--
#  <Metadata Name>:
#    description: <description of the metadata>
#    format: <format of the metadata value>
#    unique: Yes | No | <integer value>
#    optional: Yes | No | Optional
#    validator: <name of validator function defined in "validator_functions.py">
#    argument:
#        valueName: <value name from the 'values' section>
#        regexExpression: <regex expression>
#        child: <name of a child metadata>
#        parent: <name of a parent metadata>
#        <custom parameter>: <name of custom parameter>
#
# --DESCRIPTION--
#  -> unique:
#         - Yes | yes: this metadata metadata name is unique
#         - No | no: this metadata metadata name can be duplicated unlimited times
#         - <integer value>: this metadata metadata name can be duplicated <integer value> times
#  -> optional:
#        - Yes | yes: this metadata metadata is not required by the program and optional in metadata
#        - No | no: this metadata metadata is required by the program and must be in metadata
#        - Optional | optional: this metadata metadata is required by the program but optional in metadata
#                               (validator must auto-generate this metadata if missing from the YARA rule)
#                               (currently only supported by "valid_uuid", "valid_fingerprint", "valid_version",
#                                                                 and "valid_modified")
#  -> validator:
#        - <name of validator function defined in "validator_functions.py">: this function will be called to validate the metadata
#  -> argument:
#        - valueName: regex expressions under "valueName" of the 'values' section will be used (mutually exclusive with regexExpression)
#        - regexExpression: provided regex expression will be used to validate the metadata (mutually exclusive with valueName)
#        - child: name of a child metadata (mutually exclusive with parent)
#        - parent: name of a parent metadata (mutually exclusive with child)
#        - <custom parameter>: any custom parameter that will be passed to the validator as a part of "argument"
#                             (info|exploit|technique|tool|malware and mitre_att below have examples of some arguments
#                             that are passed into facilitate some more complex behaviors)
#
# --NOTE--
# 1. "unique" and "optional" are required fields.
# 2. If "valid_regex" is used as a validator, "valueName" or "regexExpression" must be provided.
# 3. Custom validators should be defined in validator_functions.py and included in self.names of Validators class
# 4. Child metadata create MetadataAttributes instances as temporary place holders in self.required_fields and validators for child metadata
#    should use the place holders to create the actual MetadataAttributes instances in self.required_fields_children of yara_validator.py (YaraValidator class).
# 5. There are reserved parameters for "argument" such as valueName, regexExpression, child, parent and child_place_holder
#
# --EXAMPLE--
# metadata_1:
#   description: 'this is metadata1'
#   format: 'hex string'
#   unique: Yes
#   optional: Yes
#   validator: valid_metadata_1
#
# metadata_2:
#   description: 'this is metadata2'
#   format: 'unvalidated'
#   unique: No
#   optional: Optional
#   validator: valid_regex
#   argument:
#      valueName: unvalidated_regex
#
# metadata_3:
#   description: 'this is metadata3'
#   format: 'lowercase_author@uppercase_organization or uppercase_organization'
#   unique: 3
#   optional: No
#   validator: valid_regex
#   argument:
#     regexExpression: ^[a-zA-Z]+\@[A-Z]+$|^[A-Z]+$

---
# Merged values (previously in CCCS_YARA_values.yml)
values:
   description: "Validator Configuration File"
   version: 0.9
   rule_statuses:
      -
         value: 'TESTING'
      -
         value: 'RELEASED'
      -
         value: 'DEPRECATED'

   sharing_classifications:
      -
         value: 'TLP:CLEAR|TLP:CLEAR//COMMERCIAL|TLP:WHITE|TLP:WHITE//COMMERCIAL'
      -
         value: 'TLP:GREEN|TLP:GREEN//COMMERCIAL'
      -
         value: 'TLP:AMBER|TLP:AMBER//COMMERCIAL'
      -
         value: 'TLP:AMBER\+STRICT|TLP:AMBER\+STRICT//COMMERCIAL'

   category_types:
      -
         value: 'INFO'
      -
         value: 'EXPLOIT'
      -
         value: 'TECHNIQUE'
      -
         value: 'TOOL'
      -
         value: 'MALWARE'

   malware_types:
      -
         value: "ADWARE"
         description: "Software that shows you extra promotions that you cannot control as you use your PC. You wouldn't see the extra ads if you didn't have adware installed."
      -
         value: "APT"
         description: "Malware related to an Advanced Persistent Threat (APT) group."
      -
         value: "BACKDOOR"
         description: "A backdoor Trojan gives malicious users remote control over the infected computer. They enable the author to do anything they wish on the infected computer including sending, receiving, launching and deleting files, displaying data and rebooting the computer. Backdoor Trojans are often used to unite a group of victim computers to form a botnet or zombie network that can be used for criminal purposes."
      -
         value: "BANKER"
         description: "Trojan Banker programs are designed to steal your account data for online banking systems, e-payment systems and credit or debit cards."
      -
         value: "BOOTKIT"
         description: "A malware variant that modifies the boot sectors of a hard drive, including the Master Boot Record (MBR) and Volume Boot Record (VBR)."
      -
         value: "BOT"
         description: "A malicious bot is self-propagating malware designed to infect a host and connect back to a central server or servers that act as a command and control (C&C) center for an entire network of compromised devices, or botnet."
      -
         value: "BROWSER-HIJACKER"
         description: "A browser hijacker is defined as a form of unwanted software that modifies a web browser's settings without the user's permission. The result is the placement of unwanted advertising into the browser, and possibly the replacement of an existing home page or search page with the hijacker page."
      -
         value: "BRUTEFORCER"
         description: "Trojan bruteforcer are trying to brute force website in order to achieve something else (EX: Finding  WordPress websites with default credentials)."
      -
         value: "CLICKFRAUD"
         description: "A type of trojan that can use your PC to 'click' on websites or applications. They are usually used to make money for a malicious hacker by clicking on online advertisements and making it look like the website gets more traffic than it does. They can also be used to skew online polls, install programs on your PC, or make unwanted software appear more popular than it is."
      -
         value: "CRYPTOMINER"
         description: "Cryptocurrency mining malware."
      -
         value: "DDOS"
         description: "These programs conduct DoS (Denial of Service) attacks against a targeted web address. By sending multiple requests from your computer and several other infected computers, the attack can overwhelm the target address leading to a denial of service."
      -
         value: "DOWNLOADER"
         description: "Trojan Downloaders can download and install new versions of malicious programs in the target system."
      -
         value: "DROPPER"
         description: "These programs are used by hackers in order to install malware or to prevent the detection of malicious programs."
      -
         value: "EXPLOITKIT"
         description: "Exploit kits are programs that contain data or code that takes advantage of a vulnerability within an application that is running in the target system."
      -
         value: "FAKEAV"
         description: "Trojan FakeAV programs simulate the activity of antivirus software. They are designed to extort money in return for the detection and removal of threat, even though the threats that they report are actually non-existent."
      -
         value: "HACKTOOL"
         description: "A type of tool that can be used to allow and maintain unauthorized access to your PC."
      -
         value: "INFOSTEALER"
         description: "A program that collects your personal information, such as your browsing history, and uses it without adequate consent."
      -
         value: "KEYLOGGER"
         description: "A keylogger monitors and logs every keystroke it can identify. Once installed, the virus either keeps track of all the keys and stores the information locally, after which the hacker needs physical access to the computer to retrieve the information, or the logs are sent over the internet back to the hacker."
      -
         value: "LOADER"
         description: "A program that loads another application / memory space."
      -
         value: "OBFUSCATOR"
         description: "A type of malware that hides its code and purpose to make it more difficult for security software to detect or remove it."
      -
         value: "POS"
         description: "Point-of-sale malware is usually a type of malware that is used by cybercriminals to target point of sale (POS) and payment terminals with the intent to obtain credit card and debit card information."
      -
         value: "PROXY"
         description: "This type of trojan allows unauthorized parties to use the infected computer as a proxy server to access the Internet anonymously."
      -
         value: "RAT"
         description: "A program that can be used by a remote hacker to gain access and control of an infected machine."
      -
         value: "RANSOMWARE"
         description: "This type of malware can modify data in the target computer so the operating system will stop running correctly or the data is no longer accessible. The criminal will only restore the computer state or data after a ransom is paid to them (mostly using cryptocurrency)."
      -
         value: "REVERSE-PROXY"
         description: "A reverse proxy is a server that receives requests from the internet and forwards them to a small set of servers."
      -
         value: "ROOTKIT"
         description: "Rootkits are designed to conceal certain objects or activities in the system. Often their main purpose is to prevent malicious programs being detected in order to extend the period in which programs can run on an infected computer."
      -
         value: "SCANNER"
         description: "This type of malware scan the internet / network(s) / system(s) / service(s) to collect information. That information could be used later to perpetuate an cyber attack."
      -
         value: "SCAREWARE"
         description: "Scareware is a form of malware which uses social engineering to cause shock, anxiety, or the perception of a threat in order to manipulate users into buying unwanted software."
      -
         value: "SPAMMER"
         description: "Malware that is sending spam."
      -
         value: "TROJAN"
         description: "Generic or Unknown Trojan"
      -
         value: "VIRUS"
         description: "A generic computer virus"
      -
         value: "WIPER"
         description: "A type of malware that destroy the data."
      -
         value: "WEBSHELL"
         description: "A web shell is a script that can be uploaded to a web server to enable remote administration of the machine."
      -
         value: "WORM"
         description: "A type of malware that spreads to other PCs."

   actor_types:
      -
         value: "APT"
      -
         value: "CRIMEWARE"
      -
         value: "FIN"

   hash_types:
      -
         value: "[a-fA-F0-9]{32}"
      -
         value: "[a-fA-F0-9]{40}"
      -
         value: "[a-fA-F0-9]{64}"

   unvalidated_regex:
      -
         value: ".*"

   universal_regex:
      -
         value: '[^a-z]*'

id:
   description: "Autogenerated unique identifier based on RFC 4122 if a uuid is not already present"
   format: "Base 62 conversion of UUID"
   unique: Yes
   optional: Optional
   validator: valid_uuid

fingerprint:
   description: "Autogenerated based on SHA256 hash of string values and the condition statement of the YARA rule"
   format: "hex string"
   unique: Yes
   optional: Optional
   validator: valid_fingerprint

version:
   description: "Revision of the rule, autogenerated as 1.0 if no present"
   format: "x.x"
   unique: Yes
   optional: Optional
   validator: valid_version

score:
   description: "Percentage of confidence in the rule."
   format: integer
   unique: Yes
   optional: Yes
   validator: valid_percentage

minimum_yara:
   description: "Minimum version of Yara to run the rule"
   format: "x.x"
   unique: Yes
   optional: Yes
   validator: valid_version

date:
   description: "Date stamp of when the rule was created"
   format: "YYYY-MM-DD"
   unique: Yes
   optional: Yes
   validator: valid_date

modified:
   description: "Last modified date"
   format: "YYYY-MM-DD"
   unique: Yes
   optional: Optional
   validator: valid_date

tags:
   description: "A set of keywords relevant to the rule"
   format: unvalidated
   unique: No
   optional: Yes
   validator: None

status:
   description: "Status of the rule as assigned by the submitter"
   format: "uppercase"
   unique: Yes
   optional: No
   validator: valid_regex
   argument:
      valueName: rule_statuses

sharing:
   description: "Sharing limitation"
   format: "uppercase"
   unique: Yes
   optional: No
   validator: valid_regex
   argument:
      valueName: sharing_classifications

source:
   description: "Source organization of the YARA rule"
   format: "uppercase"
   unique: Yes
   optional: No
   validator: valid_source

author:
   description: "Author and organization"
   format: "lowercase_author@uppercase_organization or uppercase_organization"
   unique: No
   optional: No
   validator: valid_regex
   argument:
      regexExpression: ^[a-zA-Z]+\@[A-Z]+$|^[A-Z\s._-]+$|^.*$

description:
   description: "The description of the rule"
   format: ".*"
   unique: Yes
   optional: No
   validator: valid_regex
   argument:
      regexExpression: ".*"

category:
   description: "Detection category"
   format: "uppercase"
   unique: Yes
   optional: No
   validator: valid_category
   argument:
      child: info|exploit|technique|tool|malware

info|exploit|technique|tool|malware:
   description: "Specific information about the category.
      if_key_gen_mitre_att: is used to define which keys will been used to generate mitre_att software ids
      mitre_softwareid_gen: is an array that will be used during runtime to store software ids generated,
      this will be compared with mitre_softwareid_found and values not found there
      will be generated"
   format: "uppercase"
   unique: No
   optional: Yes
   validator: valid_category_type
   argument:
      parent: category
      generate_mitre_att_from: ^tool$|^malware$

malware_type:
   description: "Give an indication as to what the capability/purpose of the malware is"
   format: "uppercase"
   unique: No
   optional: Yes
   validator: valid_regex
   argument:
      valueName: malware_types

mitre_att:
   description: "Any valid MITRE ATT&CK ID codes
      mitre_softwareid_found: is an array that will be used during runtime to store software ids found"
   format: "'TA####'|'T####'|'M####'|'G####'|'S####'"
   unique: No
   optional: Yes
   validator: valid_mitre_att

agent_threat_rule_id:
   description: "Optional cross-reference to an Agent Threat Rules (ATR) detection rule
      (https://github.com/Agent-Threat-Rule/agent-threat-rules). Lets YARA rules covering
      AI-agent-related artefacts surface their relationship to a corresponding open ATR
      runtime detection rule where one exists. Optional and additive: rules without an
      ATR cross-reference validate unchanged."
   format: "'ATR-YYYY-NNNNN'"
   unique: No
   optional: Yes
   validator: valid_regex
   argument:
      regexExpression: ^ATR-\d{4}-\d{5}$

actor_type:
   description: "The type of the actor"
   format: "uppercase"
   unique: 2
   optional: Yes
   validator: valid_regex
   argument:
      valueName: actor_types

actor:
   description: "Actor name as stated by the source"
   format: "uppercase"
   unique: Yes
   optional: Yes
   validator: valid_actor
   argument:
      child: mitre_group
      required: actor_type

mitre_group:
   description: 'Autogenerated alias of the actor value based on the "https://attack.mitre.org/groups/" standard'
   format: "uppercase"
   unique: Yes
   optional: Yes
   validator: mitre_group_generator
   argument:
      parent: actor

report:
   description: "Report linked to this rule"
   format: ".*"
   unique: No
   optional: Yes
   validator: valid_regex
   argument:
      valueName: universal_regex

reference:
   description: "Reference for the rule i.e. weblink, report, individual, etc."
   format: "unvalidated"
   unique: No
   optional: Yes
   validator: valid_regex
   argument:
      valueName: unvalidated_regex

hash:
   description: "Sample hash"
   format: "lowercase MD5, SHA, or SHA-256"
   unique: No
   optional: Yes
   validator: valid_regex
   argument:
      valueName: hash_types

vol_script:
   description: "Used by the Reverse Engineering team"
   format: "unvalidated"
   unique: Yes
   optional: Yes
   validator: None

al_*:
   description: "Assembly Line specific metadata added for internal Assembly Line use"
   format: "unvalidated"
   unique: Yes
   optional: Yes
   validator: None

credit:
   description: "Used when the autor would like credit for the rule"
   format: "unvalidated"
   unique: No
   optional: Yes
   validator: None

original_*:
   description: "For rules converted from other sources so that we preserve the original metadata"
   format: "unvalidated"
   unique: No
   optional: Yes
   validator: None
